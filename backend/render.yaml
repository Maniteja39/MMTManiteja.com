# Render Blueprint — one-shot infra for the API + Postgres.
# Deploy with: https://render.com/docs/infrastructure-as-code
#
# After first deploy, set the following in the Render dashboard (or here if you're
# comfortable committing references — values still come from the secret store):
#   JWT_SECRET          → generate with `openssl rand -base64 48`
#   ADMIN_USERNAME      → e.g. "maniteja"
#   ADMIN_PASSWORD      → strong, random; rotate by changing the env var + restart
#   CORS_ALLOWED_ORIGINS (optional override — defaults already include maniteja.com)

databases:
  - name: mmtmaniteja-db
    plan: free            # upgrade when you outgrow it
    databaseName: mmtmaniteja
    user: mmtmaniteja
    postgresMajorVersion: 16

services:
  - type: web
    name: mmtmaniteja-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free            # upgrade to "starter" for no cold starts
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mmtmaniteja-db
          property: connectionString
      - key: JWT_SECRET
        sync: false       # set manually in dashboard; never committed
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://maniteja.com,https://www.maniteja.com
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=70 -XX:+UseG1GC
